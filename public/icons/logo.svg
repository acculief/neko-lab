<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2D4A"/>
      <stop offset="100%" style="stop-color:#0F1C30"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C040"/>
      <stop offset="100%" style="stop-color:#C4892A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- 背景円 -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- 猫の耳（左）外 -->
  <polygon points="42,90 58,42 82,80" fill="white" filter="url(#shadow)"/>
  <!-- 猫の耳（右）外 -->
  <polygon points="158,90 142,42 118,80" fill="white" filter="url(#shadow)"/>
  <!-- 猫の耳（左）内 -->
  <polygon points="48,84 60,50 76,76" fill="#FFC0C0"/>
  <!-- 猫の耳（右）内 -->
  <polygon points="152,84 140,50 124,76" fill="#FFC0C0"/>

  <!-- 猫の顔 -->
  <circle cx="100" cy="115" r="54" fill="white" filter="url(#shadow)"/>

  <!-- 目（左）外 -->
  <ellipse cx="82" cy="108" rx="10" ry="12" fill="#1A2D4A"/>
  <!-- 目（左）ハイライト -->
  <circle cx="86" cy="104" r="3.5" fill="white"/>
  <!-- 目（左）小ハイライト -->
  <circle cx="80" cy="113" r="1.5" fill="white" opacity="0.6"/>

  <!-- 目（右）外 -->
  <ellipse cx="118" cy="108" rx="10" ry="12" fill="#1A2D4A"/>
  <!-- 目（右）ハイライト -->
  <circle cx="122" cy="104" r="3.5" fill="white"/>
  <!-- 目（右）小ハイライト -->
  <circle cx="116" cy="113" r="1.5" fill="white" opacity="0.6"/>

  <!-- 鼻 -->
  <ellipse cx="100" cy="124" rx="5" ry="3.5" fill="#FFB6C1"/>
  <!-- 口 -->
  <path d="M 100 127 Q 91 134 86 131" stroke="#1A2D4A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 127 Q 109 134 114 131" stroke="#1A2D4A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ひげ（左上） -->
  <line x1="50" y1="120" x2="86" y2="122" stroke="#1A2D4A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- ひげ（左下） -->
  <line x1="50" y1="128" x2="86" y2="127" stroke="#1A2D4A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- ひげ（右上） -->
  <line x1="150" y1="120" x2="114" y2="122" stroke="#1A2D4A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- ひげ（右下） -->
  <line x1="150" y1="128" x2="114" y2="127" stroke="#1A2D4A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- トロフィー（右下） -->
  <g transform="translate(130, 148) scale(0.9)">
    <!-- トロフィーカップ -->
    <path d="M 10 0 L 30 0 L 28 20 Q 20 28 12 20 Z" fill="url(#goldGrad)"/>
    <!-- ハンドル左 -->
    <path d="M 10 5 Q 2 5 2 13 Q 2 20 10 18" stroke="#C4892A" stroke-width="2.5" fill="none"/>
    <!-- ハンドル右 -->
    <path d="M 30 5 Q 38 5 38 13 Q 38 20 30 18" stroke="#C4892A" stroke-width="2.5" fill="none"/>
    <!-- 台座 -->
    <rect x="13" y="20" width="14" height="5" fill="#C4892A"/>
    <rect x="8" y="25" width="24" height="4" rx="1" fill="url(#goldGrad)"/>
    <!-- 星 -->
    <polygon points="20,4 21.5,8.5 26,8.5 22.5,11 24,15.5 20,13 16,15.5 17.5,11 14,8.5 18.5,8.5" fill="white" opacity="0.9"/>
  </g>
</svg>
