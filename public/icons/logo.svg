<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#1A2D4A"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#F2E4CC"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CD964"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
  </defs>

  <!-- 背景円 -->
  <circle cx="32" cy="32" r="31" fill="url(#bgGrad)"/>
  <!-- 背景の星 -->
  <circle cx="12" cy="14" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="52" cy="12" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="54" cy="22" r="0.5" fill="white" opacity="0.35"/>
  <circle cx="10" cy="24" r="0.6" fill="white" opacity="0.4"/>

  <!-- 耳（左） -->
  <polygon points="15,30 21,14 28,27" fill="url(#faceGrad)"/>
  <polygon points="17,28 21,17 26,26" fill="#FFAFC0" opacity="0.75"/>

  <!-- 耳（右） -->
  <polygon points="49,30 43,14 36,27" fill="url(#faceGrad)"/>
  <polygon points="47,28 43,17 38,26" fill="#FFAFC0" opacity="0.75"/>

  <!-- 顔 -->
  <ellipse cx="32" cy="38" rx="19" ry="17" fill="url(#faceGrad)"/>

  <!-- 目（左） -->
  <ellipse cx="24" cy="35" rx="4" ry="4.5" fill="#1A2D4A"/>
  <ellipse cx="24" cy="35" rx="3" ry="3.5" fill="url(#eyeGrad)"/>
  <ellipse cx="24" cy="35" rx="1.4" ry="3" fill="#1A2D4A"/>
  <circle cx="22.5" cy="32.5" r="1" fill="white"/>

  <!-- 目（右） -->
  <ellipse cx="40" cy="35" rx="4" ry="4.5" fill="#1A2D4A"/>
  <ellipse cx="40" cy="35" rx="3" ry="3.5" fill="url(#eyeGrad)"/>
  <ellipse cx="40" cy="35" rx="1.4" ry="3" fill="#1A2D4A"/>
  <circle cx="38.5" cy="32.5" r="1" fill="white"/>

  <!-- 鼻 -->
  <path d="M30,41 L32,44 L34,41 Q32,38.5 30,41Z" fill="#FF8FAB"/>

  <!-- 口 -->
  <path d="M32,44 Q27,48 24,46" stroke="#C4892A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M32,44 Q37,48 40,46" stroke="#C4892A" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- ヒゲ（左） -->
  <line x1="14" y1="40" x2="27" y2="41.5" stroke="#A0A0A0" stroke-width="0.9" opacity="0.65"/>
  <line x1="14" y1="43.5" x2="27" y2="43.5" stroke="#A0A0A0" stroke-width="0.9" opacity="0.65"/>

  <!-- ヒゲ（右） -->
  <line x1="50" y1="40" x2="37" y2="41.5" stroke="#A0A0A0" stroke-width="0.9" opacity="0.65"/>
  <line x1="50" y1="43.5" x2="37" y2="43.5" stroke="#A0A0A0" stroke-width="0.9" opacity="0.65"/>

  <!-- ゴールドバッジ（肉球） -->
  <circle cx="48" cy="52" r="7.5" fill="#C4892A"/>
  <!-- 肉球アイコン（小さな丸+楕円） -->
  <ellipse cx="48" cy="54" rx="2.8" ry="2.2" fill="#FFF8EE" opacity="0.9"/>
  <circle cx="45.5" cy="51.2" r="1.3" fill="#FFF8EE" opacity="0.9"/>
  <circle cx="48" cy="50.5" r="1.3" fill="#FFF8EE" opacity="0.9"/>
  <circle cx="50.5" cy="51.2" r="1.3" fill="#FFF8EE" opacity="0.9"/>
</svg>
