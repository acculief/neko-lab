<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1A2D4A"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#F5ECD7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#C4892A"/>
    </linearGradient>
    <clipPath id="circ">
      <circle cx="100" cy="100" r="92"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <circle cx="100" cy="100" r="96" fill="#1A2D4A"/>
  <circle cx="100" cy="100" r="92" fill="url(#bg)"/>

  <!-- 星（装飾） -->
  <circle cx="40" cy="38" r="2" fill="white" opacity="0.6"/>
  <circle cx="165" cy="32" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="155" cy="60" r="1" fill="white" opacity="0.4"/>
  <circle cx="32" cy="70" r="1.5" fill="white" opacity="0.4"/>

  <!-- 耳（左）-->
  <path d="M58 98 L70 52 L92 88" fill="url(#faceGrad)"/>
  <!-- 耳内（左） -->
  <path d="M64 90 L72 62 L86 84" fill="#FFB3C1" opacity="0.6"/>

  <!-- 耳（右）-->
  <path d="M142 98 L130 52 L108 88" fill="url(#faceGrad)"/>
  <!-- 耳内（右） -->
  <path d="M136 90 L128 62 L114 84" fill="#FFB3C1" opacity="0.6"/>

  <!-- 顔 -->
  <ellipse cx="100" cy="112" rx="46" ry="42" fill="url(#faceGrad)"/>

  <!-- 目（左） -->
  <ellipse cx="84" cy="105" rx="7" ry="8" fill="#1A2D4A"/>
  <ellipse cx="84" cy="104" rx="5.5" ry="6.5" fill="#2ECC71"/>
  <ellipse cx="84" cy="104" rx="2.5" ry="5" fill="#1A2D4A"/>
  <circle cx="82" cy="101.5" r="1.5" fill="white"/>

  <!-- 目（右） -->
  <ellipse cx="116" cy="105" rx="7" ry="8" fill="#1A2D4A"/>
  <ellipse cx="116" cy="104" rx="5.5" ry="6.5" fill="#2ECC71"/>
  <ellipse cx="116" cy="104" rx="2.5" ry="5" fill="#1A2D4A"/>
  <circle cx="114" cy="101.5" r="1.5" fill="white"/>

  <!-- 鼻 -->
  <path d="M97 117 L100 120 L103 117 Q100 114 97 117Z" fill="#F4A0A0"/>

  <!-- 口 -->
  <path d="M100 120 Q94 126 90 123" stroke="#C4892A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M100 120 Q106 126 110 123" stroke="#C4892A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ヒゲ（左） -->
  <line x1="88" y1="119" x2="62" y2="115" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="88" y1="122" x2="62" y2="122" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="88" y1="125" x2="64" y2="129" stroke="#888" stroke-width="1.2" opacity="0.7"/>

  <!-- ヒゲ（右） -->
  <line x1="112" y1="119" x2="138" y2="115" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="112" y1="122" x2="138" y2="122" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="112" y1="125" x2="136" y2="129" stroke="#888" stroke-width="1.2" opacity="0.7"/>

  <!-- 頭頂部の毛 -->
  <path d="M95 72 Q100 64 105 72" stroke="url(#faceGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 金バッジ -->
  <circle cx="148" cy="152" r="18" fill="url(#gold)"/>
  <text x="148" y="158" text-anchor="middle" font-size="16" font-family="serif" font-weight="bold" fill="white">🐾</text>
</svg>
